<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Open Workout App{% endblock %}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<style>
  main.container { padding-bottom: 5rem; }
  .list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: .5rem;
    padding: .6rem 0;
    border-bottom: 1px solid var(--pico-muted-border-color);
  }
  .list-item a { text-decoration: none; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
  .top-bar a[role="button"] { margin: 0; }
  ul.plain { list-style: none; padding: 0; margin: 0; }
  form.inline-row { display: flex; gap: .5rem; flex: 1; align-items: center; }
  form.inline-row button { width: auto; margin: 0; white-space: nowrap; }
  .add-form { display: flex; gap: .5rem; margin-top: 1rem; }
  .add-form button { width: auto; margin: 0; }
  .icon-btn {
    flex: 0 0 auto;
    width: 2.25rem;
    height: 2.25rem;
    margin: 0;
    padding: 0;
    line-height: 1;
    font-size: 1rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn.round { border-radius: 50%; }
  .fab {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: inline-flex;
    align-items: center;
    gap: .45rem;
    background: #f97316;
    color: #fff;
    padding: .8rem 1.5rem;
    border-radius: 999px;
    text-decoration: none;
    font-weight: 600;
    font-size: 1rem;
    box-shadow: 0 4px 14px rgba(0,0,0,.28);
    z-index: 50;
    white-space: nowrap;
  }
  .fab:hover, .fab:focus { background: #ea6a0c; color: #fff; }
  .fab .fab-icon { font-size: 1.2rem; line-height: 1; }
  .unit-badge { font-size: .9rem; opacity: .7; }
  .date-warning-banner {
    background: rgba(249, 115, 22, 0.12);
    border-left: 4px solid #f97316;
    padding: .5rem .75rem;
    border-radius: 4px;
    font-size: .9rem;
    margin-bottom: 1rem;
  }
  input[type="date"].date-warning {
    border-color: #f97316;
    background: rgba(249, 115, 22, 0.08);
  }
</style>
</head>
<body>
<main class="container">
  <nav>
    <ul><li><strong><a href="{{ url_for('pages.index') }}">🏋️ Open Workout App</a></strong></li></ul>
    <ul><li>
      <a href="{{ url_for('pages.about') }}" role="button" class="secondary icon-btn round" aria-label="About">&#8505;&#65039;</a>
    </li></ul>
  </nav>
  {% block content %}{% endblock %}
  <footer style="text-align:center; margin-top:2rem;">
    <small><a href="{{ url_for('pages.about') }}" class="secondary">Open Workout App v{{ app_version }}</a></small>
  </footer>
</main>
</body>
</html>
